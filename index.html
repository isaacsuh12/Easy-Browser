<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Browser</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="phone-frame">
        <header class="top-bar">
          <button id="homeButton" class="ghost-btn home-btn" type="button">🏠 Home</button>
          <div>
            <p class="eyebrow">Easy Browser</p>
            <h1>AI Overview</h1>
          </div>
        </header>

        <nav class="tab-nav" aria-label="View tabs">
          <button class="tab-btn active" data-tab="homeTab" type="button">AI overview</button>
          <button class="tab-btn" data-tab="imagesTab" type="button">Images</button>
        </nav>

        <main class="tab-content">
          <section id="homeTab" class="tab-panel active" aria-label="AI overview">
            <div class="overview-card">
              <div class="emoji-ring">🧠</div>
              <h2>AI Overview</h2>
              <p>Explore a clean and simple page focused on AI insights.</p>
              <div class="overview-list">
                <div class="overview-item">Smart answers, no clutter</div>
                <div class="overview-item">Easy reading, emoji-driven layout</div>
                <div class="overview-item">Simple page with one focus</div>
              </div>
            </div>
          </section>

          <section id="imagesTab" class="tab-panel hidden" aria-label="Images page">
            <div class="images-header">
              <h2>Image View</h2>
              <p>A minimal images page with simple cards and no links.</p>
            </div>
            <div class="images-grid">
              <div class="image-card">📷<span>Image 1</span></div>
              <div class="image-card">📷<span>Image 2</span></div>
              <div class="image-card">📷<span>Image 3</span></div>
              <div class="image-card">📷<span>Image 4</span></div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
