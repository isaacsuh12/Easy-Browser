<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy Browser</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="phone-frame">
        <div id="homeScreen" class="screen">
          <header class="top-bar">
            <div>
              <p class="eyebrow">Easy Browser</p>
              <h1>Simple Home</h1>
            </div>
            <button id="editButton" class="ghost-btn" type="button">Edit</button>
          </header>

          <section class="search-card" aria-label="Search the web">
            <label class="sr-only" for="searchInput">Search the web</label>
            <input id="searchInput" type="text" placeholder="Search or type a website" />
            <button id="searchButton" type="button">Go</button>
          </section>

          <main id="appGrid" class="home-grid" aria-label="Favorite apps"></main>

          <section id="editorPanel" class="editor-panel hidden" aria-live="polite">
            <div class="editor-header">
              <h2>Helpful editor</h2>
              <p>Grandchildren can add a favorite site or make buttons easier to read.</p>
            </div>

            <div class="settings-grid">
              <label class="setting">
                <span>Text size</span>
                <input id="fontSize" type="range" min="16" max="24" step="1" />
              </label>
              <label class="setting toggle">
                <span>High contrast</span>
                <input id="highContrast" type="checkbox" />
              </label>
              <label class="setting toggle">
                <span>Big buttons</span>
                <input id="bigButtons" type="checkbox" />
              </label>
            </div>

            <form id="appForm" class="app-form">
              <input id="appTitle" name="title" type="text" placeholder="App name" required />
              <input id="appUrl" name="url" type="text" placeholder="https://www.google.com" required />
              <input id="appIcon" name="icon" type="text" maxlength="2" placeholder="🌐" required />
              <div class="form-actions">
                <button class="primary-btn" type="submit">Save app</button>
                <button id="cancelEdit" class="ghost-btn" type="button">Cancel</button>
              </div>
            </form>

            <div id="appList" class="app-list"></div>
          </section>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
